<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaker Endtable — jazwa</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { width: 100%; height: 100%; }

  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

  main {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Times New Roman', serif;
  }

  .card {
    background: #FFF9E6;
    border: 2px solid #111;
    max-width: 720px;
    padding: 2.5rem 3rem;
  }

  .card h1 { font-weight: 400; margin-bottom: 0.5rem; }

  .card p { margin-bottom: 1rem; line-height: 1.5; }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-top: 1.5rem;
  }

  .gallery img { width: 100%; display: block; }

  nav { margin-top: 2rem; }
  nav a { color: #111; }
</style>
</head>
<body>

<main>
  <div class="card">
    <h1>Shaker Endtable</h1>
    <p>A little Shaker-style endtable made out of cherry and some birdseye maple. This project was probably the project that pulled me into woodworking. I worked on and off for a couple of months. Mostly hand-tools.</p>
    <div class="gallery">
      <img src="/assets/shaker-endtable/full.jpg" alt="Full view">
      <img src="/assets/shaker-endtable/side.jpg" alt="Side">
      <img src="/assets/shaker-endtable/front.jpg" alt="Front">
      <img src="/assets/shaker-endtable/light.jpg" alt="Light">
      <img src="/assets/shaker-endtable/gigi.jpg" alt="Gigi on top">
      <img src="/assets/shaker-endtable/zorro.jpg" alt="Zorro on top">
    </div>
    <nav>
      <a href="/">← back</a>
    </nav>
  </div>
</main>

<canvas id="c"></canvas>

<script src="shader.js"></script>
</body>
</html>
